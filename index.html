<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengumuman Kelulusan - SMKN 1 Singkarak</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Library untuk efek Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" rel="stylesheet">
    
    <!-- File CSS Kustom -->
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>

    <!-- Overlay transparan menutupi background pattern -->
    <div class="overlay d-flex flex-column align-items-center justify-content-center min-vh-100 py-4">
        
        <div class="container flex-grow-1 d-flex align-items-center justify-content-center">
            <div class="row justify-content-center w-100">
                <div class="col-12 col-md-10 col-lg-8 col-xl-7">
                    
                    <div class="card glass-card shadow-lg border-0 rounded-4 overflow-hidden">
                        
                        <!-- HEADER KARTU (Gradient Background) -->
                        <div class="card-header border-0 text-center py-5 px-4" style="background: linear-gradient(135deg, #008080, #D4AF37);">
                            
                            <!-- Logo diperkecil (width 75) -->
                            <img src="assets/logo.png" alt="Logo SMKN 1 Singkarak" width="75" style="margin-bottom: 20px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));">
                            
                            <h4 class="fw-bold mb-3 text-white" style="letter-spacing: 1px;">Pengumuman Kelulusan Siswa</h4>
                            <h2 class="fw-bolder mb-4 text-white text-uppercase" style="text-shadow: 2px 2px 4px rgba(0,0,0,0.2);">SMK Negeri 1 Singkarak</h2>
                            
                            <span class="badge bg-white text-dark shadow-sm rounded-pill px-4 py-2" style="font-size: 0.95rem; font-weight: 600;">
                                Tahun Ajaran 2025/2026
                            </span>
                        </div>

                        <!-- BODY KARTU (Latar Putih untuk Countdown & Form) -->
                        <div class="card-body bg-white p-4 p-md-5 text-center">
                            
                            <!-- Bagian Hitung Mundur -->
                            <div id="countdown-section">
                                <p class="text-secondary mb-2 fw-medium">Portal akan dibuka dalam:</p>
                                <div class="timer-text text-danger mb-3" id="timer">--:--:--</div>
                                <div class="spinner-grow text-secondary spinner-grow-sm" role="status">
                                    <span class="visually-hidden">Loading...</span>
                                </div>
                            </div>

                            <!-- Bagian Pengecekan -->
                            <div id="cek-section" class="d-none py-2">
                                
                                <!-- Wadah Input (Sembunyi saat hasil muncul) -->
                                <div id="form-input-wrapper">
                                    <p class="text-secondary mb-3">Silakan masukkan <strong>Kode Kelulusan</strong> unik Anda.</p>
                                    
                                    <div class="input-group input-group-lg mb-3 mx-auto shadow-sm rounded" style="max-width: 500px;">
                                        <input type="text" id="input-kode" class="form-control fs-6 border-end-0 custom-input" placeholder="CONTOH: RPL-SBC23" autocomplete="off" style="text-transform: uppercase;" oninput="this.value = this.value.toUpperCase()">
                                        <button class="btn btn-primary px-4 fw-bold fs-6 custom-btn" type="button" onclick="cekKelulusan()">Cek Hasil</button>
                                    </div>
                                </div>
                                
                                <!-- Area Hasil Kelulusan -->
                                <div id="result" class="alert mt-4 d-none text-start shadow-sm border-0 rounded-3" role="alert">
                                    <!-- Hasil di-inject via JS -->
                                </div>
                            </div>
                            
                        </div>
                    </div>

                </div>
            </div>
        </div>

        <!-- FOOTER -->
        <footer class="mt-auto pt-4 text-center w-100">
            <p class="text-dark fw-medium small mb-0 px-3 bg-white bg-opacity-75 d-inline-block py-2 rounded-pill shadow-sm">
                &copy; 2026 - Rekayasa Perangkat Lunak | SMKN 1 Singkarak
            </p>
        </footer>

    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Library untuk Font Awesome-->
     <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/js/all.min.js" integrity="sha512-6BTOlkauINO65nLhXhthZMtepgJSghyimIalb+crKRPhvhmsCdnIuGcVbR5/aQY2A+260iC1OPy1oCdB6pSSwQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    
    <!-- File JavaScript Kustom -->
    <script src="assets/script.js"></script>
</body>
</html>
