<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cetak Kartu Kode Kelulusan</title>
    <style>
        /* CSS KHUSUS UNTUK CETAK DAN TAMPILAN KARTU */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e9ecef; /* Warna latar luar layar */
            margin: 0;
            padding: 20px;
        }

        /* Tombol Cetak (Akan disembunyikan saat di-print) */
        .print-btn {
            display: block;
            width: 200px;
            margin: 0 auto 30px auto;
            padding: 12px 20px;
            background-color: #008080;
            color: white;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .print-btn:hover { background-color: #006666; }

        /* Container Grid Kartu */
        .card-container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px; /* Jarak antar kartu */
            justify-content: center;
            max-width: 21cm; /* Patokan lebar kertas A4 */
            margin: 0 auto;
            background: white;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        /* Desain Individual Kartu */
        .student-card {
            width: 8.5cm; /* Standar lebar kartu nama/ID */
            height: 5.5cm; /* Standar tinggi kartu */
            background-image: url('assets/bg.png'); /* Seamless pattern */
            background-repeat: repeat;
            border: 1px dashed #ccc; /* Garis potong */
            position: relative;
            box-sizing: border-box;
            
            /* WAJIB agar background tercetak di PDF */
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact; 
        }

        /* Overlay putih transparan agar teks terbaca */
        .card-overlay {
            background-color: rgba(255, 255, 255, 0.85); 
            width: 100%;
            height: 100%;
            padding: 15px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* Kop Kartu */
        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border-bottom: 2px solid #008080;
            padding-bottom: 5px;
            margin-bottom: 10px;
            width: 100%;
        }
        .header img { width: 35px; }
        .header-text {
            text-align: left;
            line-height: 1.1;
        }
        .header-title {
            font-size: 11px;
            font-weight: 800;
            color: #008080;
            margin: 0;
        }
        .header-subtitle {
            font-size: 8px;
            color: #555;
            margin: 0;
            font-weight: 600;
        }

        /* Teks Siswa */
        .student-name {
            font-size: 14px;
            font-weight: bold;
            color: #333;
            margin: 0 0 2px 0;
            text-transform: uppercase;
        }
        .student-jurusan {
            font-size: 10px;
            color: #666;
            margin-bottom: 10px;
        }

        /* Kotak Kode Unik */
        .code-box {
            background-color: #fff;
            border: 2px dashed #D4AF37; /* Warna emas */
            color: #008080; /* Warna hijau logo */
            padding: 5px 20px;
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 2px;
            border-radius: 6px;
        }

        /* PENGATURAN SAAT DI-PRINT / EKSPOR PDF */
        @media print {
            body { 
                background-color: white; 
                padding: 0; 
                margin: 0; 
            }
            .print-btn { display: none; } /* Sembunyikan tombol cetak */
            .card-container { 
                box-shadow: none; 
                padding: 0; 
                gap: 10px;
                max-width: 100%; 
            }
            .student-card {
                page-break-inside: avoid; /* Mencegah kartu terpotong di halaman baru */
                border: 1px solid #999; /* Ubah dashed jadi solid tipis saat dicetak */
            }
        }
    </style>
</head>
